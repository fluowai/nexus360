services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    configs:
      - source: litellm_config
        target: /app/config.yaml
    networks:
      nexus360_internal:
        aliases:
          - litellm
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=false"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ai_core_ollama:/root/.ollama
    networks:
      nexus360_internal:
        aliases:
          - ollama
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 12G

  # Qdrant e MinIO — adicione quando precisar de vector store ou file storage
