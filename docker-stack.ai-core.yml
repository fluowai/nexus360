services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY obrigatoria}"
      LITELLM_DATABASE_URL: "${LITELLM_DATABASE_URL:-postgresql://litellm:${AI_CORE_POSTGRES_PASSWORD:-litellm}@ai-core-postgres:5432/litellm}"
      STORE_MODEL_IN_DB: "False"
    configs:
      - source: litellm_config
        target: /app/config.yaml
    networks:
      nexus360_internal:
        aliases:
          - litellm
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=false"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ai_core_ollama:/root/.ollama
    networks:
      nexus360_internal:
        aliases:
          - ollama
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      resources:
        limits:
          memory: 12G

  ai-core-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: "${AI_CORE_POSTGRES_PASSWORD:-litellm}"
    volumes:
      - ai_core_postgres:/var/lib/postgresql/data
    networks:
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ai_core_redis:/data
    networks:
      nexus360_internal:
        aliases:
          - ai-core-redis
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - ai_core_qdrant:/qdrant/storage
    networks:
      nexus360_internal:
        aliases:
          - qdrant
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "${AI_CORE_MINIO_ROOT_USER:-nexusai}"
      MINIO_ROOT_PASSWORD: "${AI_CORE_MINIO_ROOT_PASSWORD:?AI_CORE_MINIO_ROOT_PASSWORD obrigatoria}"
    volumes:
      - ai_core_minio:/data
    networks:
      nexus360_internal:
        aliases:
          - ai-core-minio
    deploy:
      replicas: 1
      restart_policy:
        condition: any

configs:
  litellm_config:
    file: ./litellm.config.yaml

volumes:
  ai_core_ollama:
    name: nexus360_ai_core_ollama
  ai_core_postgres:
    name: nexus360_ai_core_postgres
  ai_core_redis:
    name: nexus360_ai_core_redis
  ai_core_qdrant:
    name: nexus360_ai_core_qdrant
  ai_core_minio:
    name: nexus360_ai_core_minio

networks:
  nexus360_internal:
    external: true
    name: nexus360_nexus360_internal
