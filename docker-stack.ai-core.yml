  #         - ai-core-minio
  #   deploy:
  #     replicas: 1
  #     restart_policy:
  #       condition: any

configs:
  litellm_config:
    file: ./litellm.config.yaml

volumes:
  ai_core_ollama:
    name: nexus360_ai_core_ollama
  # ai_core_qdrant:
