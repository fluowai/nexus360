version: "3.8"

services:
  frontend:
    image: ghcr.io/fluowai/nexus360-frontend:latest
    command:
      - /bin/sh
      - -c
      - >
        printf '%s\n'
        'server {'
        '  listen 80;'
        '  server_name _;'
        '  root /usr/share/nginx/html;'
        '  index index.html;'
        '  error_page 404 =200 /index.html;'
        '  location /api/ {'
        '    proxy_pass http://backend:10000/api/;'
        '    proxy_set_header Host $$host;'
        '    proxy_set_header X-Forwarded-Host $$host;'
        '    proxy_set_header X-Forwarded-Proto $$scheme;'
        '    proxy_set_header X-Real-IP $$remote_addr;'
        '  }'
        '  location /lp/ {'
        '    proxy_pass http://backend:10000/lp/;'
        '    proxy_set_header Host $$host;'
        '    proxy_set_header X-Forwarded-Host $$host;'
        '    proxy_set_header X-Forwarded-Proto $$scheme;'
        '    proxy_set_header X-Real-IP $$remote_addr;'
        '  }'
        '  location / {}'
        '}'
        > /etc/nginx/conf.d/default.conf
        && nginx -t
        && exec nginx -g 'daemon off;'
    environment:
      VITE_API_URL: "same-origin"
      VITE_LIVEKIT_URL: ""
      VITE_PANEL_URL: "https://nexus360.consultio.com.br"
      VITE_SUPABASE_URL: "${SUPABASE_URL:-}"
      VITE_SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
    networks:
      - consultio1
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=consultio1"
        - "traefik.http.routers.nexus360_frontend.rule=HostRegexp(`[a-z0-9.-]+`)"
        - "traefik.http.routers.nexus360_frontend.entrypoints=websecure"
        - "traefik.http.routers.nexus360_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.nexus360_frontend.priority=1"
        - "traefik.http.routers.nexus360_frontend.service=nexus360_frontend"
        - "traefik.http.services.nexus360_frontend.loadbalancer.server.port=80"

  api:
    image: ghcr.io/fluowai/nexus360-api:latest
    environment:
      NODE_ENV: production
      PORT: 10000
      FRONTEND_URL: "https://nexus360.consultio.com.br"
      ALLOWED_ORIGINS: "https://nexus360.consultio.com.br,https://www.nexus360.consultio.com.br"
      CORS_ORIGINS: "https://nexus360.consultio.com.br,https://www.nexus360.consultio.com.br"
      WHITELABEL_DOCKER_IP: "${WHITELABEL_DOCKER_IP:-207.58.153.219}"
      WHITELABEL_CNAME_TARGET: "${WHITELABEL_CNAME_TARGET:-nexus360.consultio.com.br}"
      TRAEFIK_DYNAMIC_DIR: "${TRAEFIK_DYNAMIC_DIR:-/traefik/dynamic}"
      TRAEFIK_SERVICE_PROVIDER: "${TRAEFIK_SERVICE_PROVIDER:-swarm}"
      TRAEFIK_FRONTEND_SERVICE: "${TRAEFIK_FRONTEND_SERVICE:-nexus360_frontend@swarm}"
      TRAEFIK_API_SERVICE: "${TRAEFIK_API_SERVICE:-nexus360_api@swarm}"
      TRAEFIK_CERT_RESOLVER: "${TRAEFIK_CERT_RESOLVER:-letsencryptresolver}"
      DATABASE_URL: "${DATABASE_URL}"
      DIRECT_URL: "${DIRECT_URL}"
      SUPABASE_DB_URL: "${DATABASE_URL}"
      PGSSLMODE: "require"
      JWT_SECRET: "${JWT_SECRET}"
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_REST_URL: "${SUPABASE_URL:-}/rest/v1"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      SUPABASE_JWT_SECRET: "${JWT_SECRET}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      SERPER_API_KEY: "${SERPER_API_KEY:-}"
      SERPAPI_API_KEY: "${SERPAPI_API_KEY:-}"
      SERP_API_KEY: "${SERP_API_KEY:-}"
      OUTSCRAPER_API_KEY: "${OUTSCRAPER_API_KEY:-}"
      OUTSCRAPER_KEY: "${OUTSCRAPER_KEY:-}"
      MUAC_API_KEY: "${MUAC_API_KEY:-}"
      TOGETHER_API_KEY: "${TOGETHER_API_KEY:-}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-}"
      LIVEKIT_URL: "${LIVEKIT_URL:-}"
      BILLING_WEBHOOK_SECRET: "${BILLING_WEBHOOK_SECRET:-}"
      ASAAS_WEBHOOK_SECRET: "${ASAAS_WEBHOOK_SECRET:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      WHATSAPP_BRIDGE_URL: "${WHATSAPP_BRIDGE_URL:-http://whatsapp-bridge:8091}"
      WHATSAPP_BRIDGE_SECRET: "${WHATSAPP_BRIDGE_SECRET}"
    networks:
      consultio1:
      nexus360_internal:
        aliases:
          - backend
    volumes:
      - "${TRAEFIK_DYNAMIC_HOST_PATH:-/opt/traefik/dynamic}:/traefik/dynamic"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=consultio1"
        - "traefik.http.routers.nexus360_api.rule=HostRegexp(`[a-z0-9.-]+`) && (PathPrefix(`/api`) || PathPrefix(`/lp`))"
        - "traefik.http.routers.nexus360_api.entrypoints=websecure"
        - "traefik.http.routers.nexus360_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.nexus360_api.priority=10"
        - "traefik.http.routers.nexus360_api.service=nexus360_api"
        - "traefik.http.services.nexus360_api.loadbalancer.server.port=10000"

  whatsapp-bridge:
    image: ghcr.io/fluowai/nexus360-whatsapp-bridge:latest
    environment:
      WHATSAPP_BRIDGE_ADDR: ":8091"
      WHATSAPP_BRIDGE_SECRET: "${WHATSAPP_BRIDGE_SECRET}"
      WHATSAPP_BRIDGE_PUBLIC_URL: "${WHATSAPP_BRIDGE_PUBLIC_URL:-https://nexus360.consultio.com.br}"
      NEXUS_BACKEND_URL: "http://backend:10000"
    volumes:
      - whatsapp_bridge_data:/app/data
    networks:
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any

networks:
  consultio1:
    external: true
    name: consultio1

  nexus360_internal:
    driver: overlay
    attachable: true

volumes:
  whatsapp_bridge_data:
