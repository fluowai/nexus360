    volumes:
      - type: volume
        source: imobzy_traefik_dynamic
        target: /dynamic
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    networks:
      consultio1:
      nexus360_internal:
        aliases:
          - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=consultio1"
        - "traefik.http.routers.nexus360_api.rule=HostRegexp(`.+`) && (PathPrefix(`/api`) || PathPrefix(`/lp`))"
        - "traefik.http.routers.nexus360_api.ruleSyntax=v3"
        - "traefik.http.routers.nexus360_api.entrypoints=websecure"
        - "traefik.http.routers.nexus360_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.nexus360_api.priority=10"
        - "traefik.http.routers.nexus360_api.service=nexus360_api"
        - "traefik.http.services.nexus360_api.loadbalancer.server.port=10000"

volumes:
  imobzy_traefik_dynamic:
    external: true
    name: imobzy_traefik_dynamic

networks:
  consultio1:
    external: true
    name: consultio1
  nexus360_internal:
    driver: overlay
    attachable: true
