  #   volumes:
  #     - ai_core_qdrant:/qdrant/storage
  #   networks:
  #     nexus360_internal:
  #       aliases:
  #         - qdrant
  #   deploy:
  #     replicas: 1
  #     restart_policy:
  #       condition: any

  # minio:
  #   image: minio/minio:latest
  #   command: ["server", "/data", "--console-address", ":9001"]
  #   environment:
  #     MINIO_ROOT_USER: "${AI_CORE_MINIO_ROOT_USER:-nexusai}"
  #     MINIO_ROOT_PASSWORD: "${AI_CORE_MINIO_ROOT_PASSWORD?AI_CORE_MINIO_ROOT_PASSWORD obrigatoria}"
  #   volumes:
  #     - ai_core_minio:/data
  #   networks:
  #     nexus360_internal:
  #       aliases:
  #         - ai-core-minio
  #   deploy:
  #     replicas: 1
  #     restart_policy:
  #       condition: any

configs:
  litellm_config:
    file: ./litellm.config.yaml

volumes:
  google_maps_scraper_data:
    name: nexus360_google_maps_scraper_data
  # ai_core_qdrant:
  #   name: nexus360_ai_core_qdrant
  # ai_core_minio:
  #   name: nexus360_ai_core_minio

networks:
  woopanel1:
    external: true
    name: woopanel1
  nexus360_internal:
    driver: overlay
    attachable: true
