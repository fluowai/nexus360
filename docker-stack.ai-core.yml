  #     - ai_core_qdrant:/qdrant/storage
  #   networks:
  #     nexus360_internal:
  #       aliases:
  #         - qdrant
  #   deploy:
  #     replicas: 1
  #     restart_policy:
  #       condition: any

  # minio:
  #   image: minio/minio:latest
  #   command: ["server", "/data", "--console-address", ":9001"]
  #   environment:
  #     MINIO_ROOT_USER: "${AI_CORE_MINIO_ROOT_USER:-nexusai}"
  #     MINIO_ROOT_PASSWORD: "${AI_CORE_MINIO_ROOT_PASSWORD?AI_CORE_MINIO_ROOT_PASSWORD obrigatoria}"
  #   volumes:
