version: "3.8"

services:
  frontend:
    image: ghcr.io/fluowai/nexus360-frontend:latest
    command:
      - /bin/sh
      - -c
      - >
        printf '%s\n'
        'server {'
        '  listen 80;'
        '  server_name _;'
        '  root /usr/share/nginx/html;'
        '  index index.html;'
        '  error_page 404 =200 /index.html;'
        '  location / {}'
        '}'
        > /etc/nginx/conf.d/default.conf
        && nginx -t
        && exec nginx -g 'daemon off;'
    environment:
      VITE_API_URL: "same-origin"
      VITE_LIVEKIT_URL: ""
      VITE_PANEL_URL: "https://nexus360.consultio.com.br"
      VITE_SUPABASE_URL: "${SUPABASE_URL:-}"
      VITE_SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
    networks:
      - consultio1
      - nexus360_internal
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=consultio1"
        - "traefik.http.routers.nexus360_frontend.rule=Host(`nexus360.consultio.com.br`)"
        - "traefik.http.routers.nexus360_frontend.entrypoints=websecure"
        - "traefik.http.routers.nexus360_frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.nexus360_frontend.priority=1"
        - "traefik.http.routers.nexus360_frontend.service=nexus360_frontend"
        - "traefik.http.services.nexus360_frontend.loadbalancer.server.port=80"

  api:
    image: ghcr.io/fluowai/nexus360-api:latest
    command:
      - /bin/sh
      - -c
      - >
        set -e;
        if [ "$${RUN_DB_PUSH:-true}" = "true" ]; then npx prisma db push --skip-generate; fi;
        if [ "$${RUN_SEED:-true}" = "true" ]; then node prisma/seed.js; fi;
        exec npm run start
    environment:
      NODE_ENV: production
      PORT: 10000
      FRONTEND_URL: "https://nexus360.consultio.com.br"
      ALLOWED_ORIGINS: "https://nexus360.consultio.com.br,https://www.nexus360.consultio.com.br"
      CORS_ORIGINS: "https://nexus360.consultio.com.br,https://www.nexus360.consultio.com.br"
      DATABASE_URL: "${DATABASE_URL}"
      DIRECT_URL: "${DIRECT_URL}"
      SUPABASE_DB_URL: "${DATABASE_URL}"
      PGSSLMODE: "require"
      JWT_SECRET: "${JWT_SECRET}"
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_REST_URL: "${SUPABASE_URL:-}/rest/v1"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY:-}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY:-}"
      SUPABASE_JWT_SECRET: "${JWT_SECRET}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-paulo@consultio.com.br}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD}"
      RUN_DB_PUSH: "${RUN_DB_PUSH:-false}"
      RUN_SEED: "${RUN_SEED:-false}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GROQ_API_KEY: "${GROQ_API_KEY:-}"
      SERPER_API_KEY: "${SERPER_API_KEY:-}"
      SERPAPI_API_KEY: "${SERPAPI_API_KEY:-}"
      SERP_API_KEY: "${SERP_API_KEY:-}"
      OUTSCRAPER_API_KEY: "${OUTSCRAPER_API_KEY:-}"
      OUTSCRAPER_KEY: "${OUTSCRAPER_KEY:-}"
      MUAC_API_KEY: "${MUAC_API_KEY:-}"
      TOGETHER_API_KEY: "${TOGETHER_API_KEY:-}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-}"
      LIVEKIT_URL: "${LIVEKIT_URL:-}"
      VERCEL_API_TOKEN: "${VERCEL_API_TOKEN:-}"
      VERCEL_TOKEN: "${VERCEL_TOKEN:-}"
      VERCEL_PROJECT_ID: "${VERCEL_PROJECT_ID:-}"
      VERCEL_TEAM_ID: "${VERCEL_TEAM_ID:-}"
      DIRECT_ADMIN_URL: "${DIRECT_ADMIN_URL:-}"
      DIRECT_ADMIN_USER: "${DIRECT_ADMIN_USER:-}"
      DIRECT_ADMIN_API_KEY: "${DIRECT_ADMIN_API_KEY:-}"
      WHM_MAIN_DOMAIN: "${WHM_MAIN_DOMAIN:-consultio.com.br}"
      BILLING_WEBHOOK_SECRET: "${BILLING_WEBHOOK_SECRET:-}"
      ASAAS_WEBHOOK_SECRET: "${ASAAS_WEBHOOK_SECRET:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
    networks:
      consultio1:
      nexus360_internal:
        aliases:
          - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:10000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=consultio1"
        - "traefik.http.routers.nexus360_api.rule=Host(`nexus360.consultio.com.br`) && (PathPrefix(`/api`) || PathPrefix(`/lp`))"
        - "traefik.http.routers.nexus360_api.entrypoints=websecure"
        - "traefik.http.routers.nexus360_api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.nexus360_api.priority=10"
        - "traefik.http.routers.nexus360_api.service=nexus360_api"
        - "traefik.http.services.nexus360_api.loadbalancer.server.port=10000"

networks:
  consultio1:
    external: true
    name: consultio1

  nexus360_internal:
    driver: overlay
    attachable: true
