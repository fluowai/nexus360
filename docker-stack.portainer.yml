        - "traefik.http.routers.nexus360_api.service=nexus360_api"
        - "traefik.http.routers.nexus360_custom_api.rule=Host(`${WHITELABEL_PRIMARY_DOMAIN:-crm.tgamkt.com}`) && (PathPrefix(`/api`) || PathPrefix(`/lp`))"
