        - "traefik.http.routers.nexus360_custom_api.priority=110"
        - "traefik.http.routers.nexus360_custom_api.service=nexus360_api"
        - "traefik.http.services.nexus360_api.loadbalancer.server.port=10000"

volumes:
  traefik_dynamic:
    name: traefik_dynamic

networks:
  consultio1:
    external: true
    name: consultio1

  nexus360_internal:
    driver: overlay
    attachable: true
