# Docker Compose para desenvolvimento local com builds pré-compilados.
# Usa os assets já em backend/dist e frontend/dist (montados como volume).
# Não precisa de Docker build.

services:
  # AI Core — LiteLLM + Ollama para LLMs auto-hospedadas
  # (espelhado do docker-stack.ai-core.yml para dev local)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    configs:
      - source: litellm_config
        target: /app/config.yaml
    networks:
      - nexus360_local
    ports:
      - "4000:4000"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ai_core_ollama_local:/root/.ollama
    networks:
      - nexus360_local
    ports:
      - "11434:11434"
    deploy:
      resources:
        limits:
          memory: 12G

  # Fim AI Core

  backend:
    image: node:20-bookworm-slim
    container_name: nexus360-backend
    working_dir: /app
    environment:
      NODE_ENV: production
      PORT: 10000
      FRONTEND_URL: "http://localhost:8080"
      CORS_ORIGINS: "http://localhost:8080,http://localhost:5173"
      JWT_SECRET: "dev-jwt-secret-nao-use-em-producao"
      DATABASE_URL: "${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/nexus360_local?schema=public}"
      DIRECT_URL: "${DIRECT_URL:-postgresql://postgres:postgres@host.docker.internal:5432/nexus360_local?schema=public}"
      GOOGLE_MAPS_SCRAPER_URL: "http://google-maps-scraper:8080"
      AI_CORE_URL: "http://litellm:4000/v1"
      AI_CORE_DEFAULT_MODEL: "qwen-local"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/dist:/app/dist
      - ./backend/node_modules:/app/node_modules
      - ./backend/prisma:/app/prisma
      - ./backend/package.json:/app/package.json
      - ./backend/.env:/app/.env
    command: node dist/server.js
    ports:
      - "10000:10000"
    networks:
      - nexus360_local

  google-maps-scraper:
    build:
      context: ./integrations/google-maps-scraper
      dockerfile: Dockerfile
    container_name: nexus360-google-maps-scraper
    command: ["-web", "-addr", ":8080", "-data-folder", "/gmapsdata", "-c", "2", "-browser-pool-size", "1"]
    volumes:
      - google_maps_scraper_local_data:/gmapsdata
    expose:
      - "8080"
    shm_size: "1gb"
    networks:
      - nexus360_local

  frontend:
    image: nginx:alpine
    container_name: nexus360-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - nexus360_local

configs:
  litellm_config:
    file: ./litellm.config.yaml

networks:
  nexus360_local:
    driver: bridge

volumes:
  ai_core_ollama_local:
  google_maps_scraper_local_data:
